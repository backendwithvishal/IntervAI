---
# ─── Ingress (AWS ALB / nginx-ingress) ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intervai-ingress
  namespace: intervai
  annotations:
    # AWS ALB annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: YOUR_ACM_CERTIFICATE_ARN
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      idle_timeout.timeout_seconds=60,
      routing.http2.enabled=true,
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=intervai-alb-logs
    # Security
    alb.ingress.kubernetes.io/waf-acl-id: YOUR_WAF_ACL_ID
    alb.ingress.kubernetes.io/security-groups: sg-intervai-alb
    # CORS
    alb.ingress.kubernetes.io/cors-allow-origin: "https://yourdomain.com"
    alb.ingress.kubernetes.io/cors-expose-headers: "Content-Range,X-Content-Range"
spec:
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intervai-api-service
                port:
                  number: 80
  tls:
    - hosts:
        - api.yourdomain.com

---
# ─── Secrets (populate via Helm / External Secrets Operator in real cluster) ──
# NOTE: In production, use AWS Secrets Manager + External Secrets Operator.
# This manifest is a template only — never commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: intervai-secrets
  namespace: intervai
  annotations:
    # Use External Secrets Operator to sync from AWS Secrets Manager
    externalsecrets.io/aws-secret-arn: "arn:aws:secretsmanager:REGION:ACCOUNT:secret:intervai/production"
type: Opaque
stringData:
  MONGO_URI: "REPLACE_FROM_SECRETS_MANAGER"
  JWT_SECRET: "REPLACE_FROM_SECRETS_MANAGER"
  GROQ_API_KEY: "REPLACE_FROM_SECRETS_MANAGER"
  REDIS_PASSWORD: "REPLACE_FROM_SECRETS_MANAGER"
  EMAIL_USER: "REPLACE_FROM_SECRETS_MANAGER"
  EMAIL_PASS: "REPLACE_FROM_SECRETS_MANAGER"
  IMAGEKIT_PRIVATE_KEY: "REPLACE_FROM_SECRETS_MANAGER"
  IMAGEKIT_PUBLIC_KEY: "REPLACE_FROM_SECRETS_MANAGER"
  IMAGEKIT_URL_ENDPOINT: "REPLACE_FROM_SECRETS_MANAGER"
  CLIENT_URL: "https://yourdomain.com"
