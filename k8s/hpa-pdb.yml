---
# ─── HorizontalPodAutoscaler — API ───────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intervai-api-hpa
  namespace: intervai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intervai-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max

---
# ─── HorizontalPodAutoscaler — Worker ────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intervai-worker-hpa
  namespace: intervai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intervai-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ─── PodDisruptionBudget — API ────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: intervai-api-pdb
  namespace: intervai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: intervai-api

---
# ─── PodDisruptionBudget — Worker ────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: intervai-worker-pdb
  namespace: intervai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: intervai-worker

---
# ─── NetworkPolicy ────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: intervai-api-netpol
  namespace: intervai
spec:
  podSelector:
    matchLabels:
      app: intervai-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 5000
  egress:
    - to: []   # Allow all egress (MongoDB, Redis, external APIs)
